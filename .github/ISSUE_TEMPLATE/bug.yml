name: Bug report
description: Report a defect in the starter template or its tooling.
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands or actions, starting from a fresh `npx degit` if relevant.
      placeholder: |
        1. npx degit marcop135/vite-vanilla-sass-lint my-app
        2. cd my-app && npm install
        3. npm run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error output if any.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. 22.14.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.1, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser (if applicable)
      placeholder: e.g. Chrome 130
